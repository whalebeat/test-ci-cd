name: Python CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:

  lint:
    name: Lint Code
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      #- name: Setup Python
      #  uses: actions/setup-python@v5
      #  with:
      #    python-version: '3.11'

      - name: Create virtual environment
        run: python -m venv venv

      - name: Install lint tools
        run: |
          venv\Scripts\python -m pip install --upgrade pip
          venv\Scripts\python -m pip install flake8

      - name: Run flake8
        run: |
          venv\Scripts\python -m flake8 src tests --max-line-length=120 --statistics


  test:
    name: Run Tests
    runs-on: self-hosted
    needs: lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create virtual environment
        run: python -m venv venv

      - name: Install dependencies
        run: |
          venv\Scripts\python -m pip install --upgrade pip
          venv\Scripts\python -m pip install -r requirements.txt

      - name: Run pytest with coverage
        run: |
          venv\Scripts\python -m pytest tests -v --cov=src --cov-report=term-missing --cov-report=xml:coverage.xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml


  summary:
    name: Build Summary
    runs-on: self-hosted
    needs: [lint, test]
    if: always()

    steps:
      - name: Success message
        if: needs.test.result == 'success'
        run: |
          echo "================================"
          echo "CI PIPELINE SUCCESS"
          echo "All checks passed"
          echo "================================"

      - name: Failure message
        if: needs.test.result == 'failure'
        run: |
          echo "CI PIPELINE FAILED"
          echo "Check logs for details"